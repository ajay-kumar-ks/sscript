<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Encrypt / Decrypt Tool</title>

<style>

body{
    font-family: "Segoe UI", Arial;
    background: #658ba9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:500px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

textarea{
    width:100%;
    min-height:110px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:15px;
    resize:none;
}

textarea:focus{
    outline:none;
    border-color:#6c63ff;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

button{
    flex:1;
    padding:11px;
    border:none;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}

.encrypt{
    background:#6c63ff;
    color:white;
}

.encrypt:hover{
    background:#564de3;
}

.decrypt{
    background:#00b894;
    color:white;
}

.decrypt:hover{
    background:#019875;
}

.result-container{
    position:relative;
    margin-top:20px;
}

.result-box{
    width:100%;
    min-height:45px;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:15px;
    resize:none;
    overflow:hidden;
}

.copy-btn{
    position:absolute;
    top:8px;
    right:8px;
    background:#232234;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
    display:none;
}

.result-container:hover .copy-btn{
    display:block;
}

.copy-btn:hover{
    background:#2e2c48;
}

.copied{
    position:absolute;
    top:-20px;
    right:0;
    font-size:12px;
    color:#00b894;
    display:none;
}

.error{
    display:none;
    margin-top:15px;
    background:#ffe6e6;
    color:#b00020;
    padding:10px;
    border-radius:6px;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Encryption Tool</h2>

<textarea id="inputText" placeholder="Enter text..."></textarea>

<div class="buttons">
<button class="encrypt" onclick="encrypt()">Encrypt</button>
<button class="decrypt" onclick="decrypt()">Decrypt</button>
</div>

<div class="result-container">

<div class="copied" id="copiedMsg">Copied ✓</div>

<textarea id="outputText" class="result-box" readonly placeholder="Result..."></textarea>

<button class="copy-btn" id="copyBtn" onclick="copyText()">Copy</button>

</div>

<div class="error" id="errorBox">
Something went wrong. Please try again.
</div>

</div>

<script>

const encryptUrl="http://localhost:8080/api/v1/encrypt";
const decryptUrl="http://localhost:8080/api/v1/decrypt";

function autoResize(el){
    el.style.height="auto";
    el.style.height=el.scrollHeight+"px";
}

function showError(){
    document.getElementById("errorBox").style.display="block";
}

function hideError(){
    document.getElementById("errorBox").style.display="none";
}

async function encrypt(){

    hideError();

    const text=document.getElementById("inputText").value;

    try{

        const res=await fetch(encryptUrl,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                text:text,
                key:4
            })
        });

        if(!res.ok) throw new Error();

        const data=await res.json();

        const output=document.getElementById("outputText");
        output.value=data.encryptedText;

        autoResize(output);

    }catch(e){
        showError();
    }
}

async function decrypt(){

    hideError();

    const text=document.getElementById("inputText").value;

    try{

        const res=await fetch(decryptUrl,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                encryptedText:text,
                key:4
            })
        });

        if(!res.ok) throw new Error();

        const data=await res.json();

        const output=document.getElementById("outputText");
        output.value=data.decryptedText;

        autoResize(output);

    }catch(e){
        showError();
    }
}

function copyText(){

    const text=document.getElementById("outputText").value;
    const btn=document.getElementById("copyBtn");

    if(!text) return;

    navigator.clipboard.writeText(text);

    btn.innerText="Copied ✓";

    setTimeout(()=>{
        btn.innerText="Copy";
    },2000);
}

</script>

</body>
</html>
